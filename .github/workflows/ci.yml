name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        # -short skips live-API/CLI integration tests (internal/agent), which
        # also self-skip when the claude CLI is absent.
        run: go test -short ./...

  ui:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: internal/tickboard/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # packageManager lives in the nested UI package.json, not the repo root
          package_json_file: internal/tickboard/ui/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: internal/tickboard/ui/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test
